"$schema" = "https://starship.rs/config-schema.json"
format = """
$os$username$hostname$directory$git_branch$git_state$git_commit$git_status$git_metrics
$battery$character"""
add_newline = false
right_format = "$all$cmd_duration$time"
palette = "catppuccin_macchiato"

[line_break]
disabled = true

[palettes.catppuccin_latte]
rosewater = "#dc8a78"
flamingo = "#dd7878"
pink = "#ea76cb"
mauve = "#8839ef"
red = "#d20f39"
maroon = "#e64553"
peach = "#fe640b"
yellow = "#df8e1d"
green = "#40a02b"
teal = "#179299"
sky = "#04a5e5"
sapphire = "#209fb5"
blue = "#1e66f5"
lavender = "#7287fd"
text = "#4c4f69"
subtext1 = "#5c5f77"
subtext0 = "#6c6f85"
overlay2 = "#7c7f93"
overlay1 = "#8c8fa1"
overlay0 = "#9ca0b0"
surface2 = "#acb0be"
surface1 = "#bcc0cc"
surface0 = "#ccd0da"
base = "#eff1f5"
mantle = "#e6e9ef"
crust = "#dce0e8"

[palettes.catppuccin_macchiato]
rosewater = "#f4dbd6"
flamingo = "#f0c6c6"
pink = "#f5bde6"
mauve = "#c6a0f6"
red = "#ed8796"
maroon = "#ee99a0"
peach = "#f5a97f"
yellow = "#eed49f"
green = "#a6da95"
teal = "#8bd5ca"
sky = "#91d7e3"
sapphire = "#7dc4e4"
blue = "blue"
lavender = "#b7bdf8"
text = "#cad3f5"
subtext1 = "#b8c0e0"
subtext0 = "#a5adcb"
overlay2 = "#939ab7"
overlay1 = "#8087a2"
overlay0 = "#6e738d"
surface2 = "#5b6078"
surface1 = "#494d64"
surface0 = "#363a4f"
base = "#24273a"
mantle = "#1e2030"
crust = "#181926"

[character]
success_symbol = "[оҳҝ Succes](bold green) [вқҜ](blue)"
error_symbol = "[п‘§ Error](bold red) [вқҜ](blue)"

[battery]
full_symbol = "уұҹў "
charging_symbol = "у°Ӯ„ "
discharging_symbol = "уұҹһ "
unknown_symbol = "у°ҒҪ "
empty_symbol = "у°ӮҺ "
format = '[\[$symbol$percentage\]]($style) [вқҜ](blue) '

[[battery.display]]
threshold = 20
style = "bold red"

[[battery.display]]
threshold = 80
style = "bold yellow"

[[battery.display]]
threshold = 100
style = "bold green"

[c]
format = ' [\[$symbol $version\]]($style)'
style = "blue"
symbol = "оҳһ "

[cmake]
format = ' [\[$symbol$version\]]($style)'
style = "blue"
symbol = "оҷі "

[cmd_duration]
min_time = 0
format = " [о®ў ]($style)[$duration](bold $style) "
show_milliseconds = true
style = "yellow"

[directory]
truncate_to_repo = false
format = "[$path]($style)[$read_only]($read_only_style) [вқҜ](blue) "
style = "pink"
home_symbol = "~"
truncation_symbol = "~/../"
truncation_length = 2
use_os_path_sep = false

[git_branch]
format = '[$symbol\($branch(:$remote_branch)\)]($style) '
style = "red"
symbol = "оңҘ"

[git_state]
disabled = false
style = "red"

[git_commit]
disabled = false
style = "red"

[git_status]
disabled = true
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "red"
deleted = "вңҳ"

[git_metrics]
disabled = true
format = '[\[](blue)[+$added]($added_style) [-$deleted]($deleted_style)[\]](blue)'

[golang]
format = ' [\[$symbol$version\]]($style)'
style = "#7fd5ea"
symbol = "оҳ§ "

[hostname]
disabled = false
ssh_only = false
format = "[$ssh_symbol](bold blue)[$hostname](lavender) [вқҜ](blue) "
trim_at = ".companyname.com"

[os]
disabled = false
format = "[$symbol]($style) [вқҜ](blue) "
style = "text"

