disabled = false
format = ' [\[$symbol($version)\]]($style)'
symbol = "оҡӢ "
style = "#ffa63a"
version_format = "v.${major}.${minor}.${patch}"

[time]
disabled = false
format = "[at](text) [$time]($style) "
style = "bold yellow"

[typst]
format = '[\[$symbol $version\]]($style)'
symbol = "пҗҚ  => пҮҒ "

[username]
disabled = false
format = "[stijn577]($style)[@]($style)"
style_root = "lavender"
style_user = "lavender"
show_always = true
