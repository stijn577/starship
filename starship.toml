"$schema" = "https://starship.rs/config-schema.json"
format = """
$os$username$hostname$directory$git_branch$git_state$git_commit$git_status$git_metrics\r\r
$battery$character"""
add_newline = false
right_format = "$all$cmd_duration$time"
palette = "catppuccin_mocha"
command_timeout = 2000
scan_timeout = 500

[line_break]
disabled = true

