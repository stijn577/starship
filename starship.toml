[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

[character]
success_symbol = "[ Succes](bold green) [❯](blue)"
error_symbol = "[ Error](bold red) [❯](blue)"

[battery]
full_symbol = "󱟢 "
charging_symbol = "󰂄 "
discharging_symbol = "󱟞 "
unknown_symbol = "󰁽 "
empty_symbol = "󰂎 "
format = '[\[$symbol$percentage\]]($style) [❯](blue) '

[[battery.display]]
threshold = 20
style = "bold red"

[[battery.display]]
threshold = 80
style = "bold yellow"

[[battery.display]]
threshold = 100
style = "bold green"

[c]
format = ' [\[$symbol $version\]]($style)'
style = "blue"
symbol = " "

[cmake]
format = ' [\[$symbol$version\]]($style)'
style = "blue"
symbol = " "

[cmd_duration]
min_time = 0
format = " [ ]($style)[$duration](bold $style) "
show_milliseconds = true
style = "yellow"

[directory]
truncate_to_repo = false
format = "[$path]($style)[$read_only]($read_only_style) [❯](blue) "
style = "pink"
home_symbol = "~"
truncation_symbol = "~/../"
truncation_length = 2
use_os_path_sep = false

[git_branch]
format = '[$symbol\($branch(:$remote_branch)\)]($style) '
style = "red"
symbol = ""

[git_state]
disabled = false
style = "red"

[git_commit]
disabled = false
style = "red"

[git_status]
disabled = true
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "red"
deleted = "✘"

[git_metrics]
disabled = true
format = '[\[](blue)[+$added]($added_style) [-$deleted]($deleted_style)[\]](blue)'

[golang]
format = ' [\[$symbol$version\]]($style)'
style = "#7fd5ea"
symbol = " "

[hostname]
disabled = false
ssh_only = false
format = "[$ssh_symbol](bold blue)[$hostname](lavender) [❯](blue) "
trim_at = ".companyname.com"

[os]
disabled = false
format = "[$symbol]($style) [❯](blue) "
style = "text"

[os.symbols]
AIX = "➿ "
AlmaLinux = "💠 "
Alpaquita = "🔔 "
Alpine = "🏔️ "
Amazon = "🙂 "
