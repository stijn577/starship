[package]
disabled = false
format = ' [\[$symbol$version\]]($style)'
symbol = "  "

[python]
disabled = false
format = ' [\[$symbol$version](#4b8bbe)[(\($virtualenv\))](#ffe873)[\]](#4b8bbe)'
symbol = " "
style = ""

[rust]
disabled = false
format = ' [\[$symbol($version)\]]($style)'
symbol = " "
style = "#ffa63a"
version_format = "v.${major}.${minor}.${patch}"

[time]
disabled = false
format = "[at](text) [$time]($style) "
style = "bold yellow"

[typst]
format = '[\[$symbol $version\]]($style)'
symbol = "  =>  "

[username]
disabled = false
format = "[stijn577]($style)[@]($style)"
style_root = "lavender"
style_user = "lavender"
show_always = true
